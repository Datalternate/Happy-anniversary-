
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Our Anniversary 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blush: #f4e0e8;
            --rose: #d4919b;
            --deep-rose: #b76e79;
            --warm-cream: #fdf6f0;
            --soft-gold: #d4a574;
            --dusty-mauve: #c9a0a0;
            --lavender: #e8d5e0;
            --text-dark: #5a3d4a;
            --text-medium: #7a5a6a;
            --text-light: #9a7a8a;
            --white-overlay: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Lora', Georgia, serif;
            background: linear-gradient(135deg, var(--warm-cream) 0%, var(--blush) 30%, var(--lavender) 60%, var(--warm-cream) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-dark);
            position: relative;
        }

        /* ============ FLOATING HEARTS BACKGROUND ============ */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            opacity: 0;
            animation: floatHeart linear infinite;
            font-size: 20px;
            filter: drop-shadow(0 0 3px rgba(212, 145, 155, 0.3));
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            50% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-100px) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--soft-gold);
            border-radius: 50%;
            animation: sparkle 3s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1); }
        }

        /* ============ EDIT MODE BANNER ============ */
        .edit-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--deep-rose), var(--soft-gold));
            color: white;
            padding: 10px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(183, 110, 121, 0.3);
            font-family: 'Lora', serif;
        }

        .edit-banner.hidden {
            display: none;
        }

        .edit-banner p {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-banner .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Lora', serif;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-preview {
            background: white;
            color: var(--deep-rose);
        }

        .btn-preview:hover {
            background: var(--warm-cream);
            transform: translateY(-2px);
        }

        .btn-generate {
            background: var(--text-dark);
            color: white;
        }

        .btn-generate:hover {
            background: #4a2d3a;
            transform: translateY(-2px);
        }

        .btn-edit-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--deep-rose), var(--soft-gold));
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            z-index: 1000;
            box-shadow: 0 6px 25px rgba(183, 110, 121, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit-toggle:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 8px 30px rgba(183, 110, 121, 0.5);
        }

        .btn-edit-toggle.hidden {
            display: none;
        }

        /* ============ MAIN CONTENT ============ */
        .page-wrapper {
            position: relative;
            z-index: 1;
            padding-top: 20px;
        }

        .page-wrapper.edit-active {
            padding-top: 80px;
        }

        /* ============ HERO SECTION ============ */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        .hero-ornament {
            font-size: 40px;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .hero-date {
            font-family: 'Lora', serif;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 15px;
        }

        .hero-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(36px, 8vw, 72px);
            color: var(--deep-rose);
            line-height: 1.2;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(183, 110, 121, 0.15);
        }

        .hero-subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(16px, 3vw, 22px);
            color: var(--text-medium);
            font-style: italic;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .decorative-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--soft-gold), transparent);
            margin: 30px auto;
        }

        /* ============ PHOTOS SECTION ============ */
        .photos-section {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            align-items: center;
        }

        .photo-frame {
            position: relative;
            background: var(--white-overlay);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(183, 110, 121, 0.15);
            transition: all 0.5s ease;
            aspect-ratio: 3/4;
            border: 3px solid rgba(212, 165, 116, 0.2);
        }

        .photo-frame:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(183, 110, 121, 0.25);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--warm-cream), var(--blush));
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .photo-placeholder:hover {
            background: linear-gradient(135deg, var(--blush), var(--lavender));
        }

        .photo-placeholder .icon {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .photo-placeholder .text {
            font-size: 14px;
            color: var(--text-light);
            font-style: italic;
        }

        .photo-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(90, 61, 74, 0.7));
            color: white;
            padding: 30px 15px 15px;
            font-family: 'Dancing Script', cursive;
            font-size: 18px;
            text-align: center;
        }

        .photo-heart-connector {
            display: none;
        }

        /* ============ LOVE LETTER SECTION ============ */
        .love-letter-section {
            padding: 40px 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .love-letter {
            background: var(--white-overlay);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 45px 40px;
            box-shadow: 0 15px 50px rgba(183, 110, 121, 0.12);
            border: 2px solid rgba(212, 165, 116, 0.15);
            position: relative;
            overflow: hidden;
        }

        .love-letter::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 120px;
            color: var(--blush);
            opacity: 0.5;
            line-height: 1;
        }

        .love-letter::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, transparent 50%, var(--blush) 50%);
            opacity: 0.3;
            border-radius: 0 25px 0 0;
        }

        .letter-greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: var(--deep-rose);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .letter-body {
            font-family: 'Lora', serif;
            font-size: 16px;
            line-height: 2;
            color: var(--text-medium);
            position: relative;
            z-index: 1;
            white-space: pre-wrap;
        }

        .letter-closing {
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            color: var(--deep-rose);
            margin-top: 30px;
            text-align: right;
            position: relative;
            z-index: 1;
        }

        /* ============ MEMORIES TIMELINE ============ */
        .memories-section {
            padding: 40px 20px;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }

        .section-title {
            font-family: 'Dancing Script', cursive;
            font-size: 36px;
            color: var(--deep-rose);
            margin-bottom: 30px;
        }

        .reasons-list {
            list-style: none;
            text-align: left;
        }

        .reasons-list li {
            padding: 15px 20px;
            margin-bottom: 12px;
            background: var(--white-overlay);
            border-radius: 15px;
            font-size: 16px;
            color: var(--text-medium);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(183, 110, 121, 0.08);
            transition: all 0.3s ease;
            border-left: 3px solid var(--dusty-mauve);
        }

        .reasons-list li:hover {
            transform: translateX(5px);
            box-shadow: 0 6px 20px rgba(183, 110, 121, 0.15);
        }

        .reasons-list li .emoji {
            font-size: 22px;
            flex-shrink: 0;
        }

        /* ============ COUNTDOWN / TIME TOGETHER ============ */
        .countdown-section {
            padding: 40px 20px;
            text-align: center;
        }

        .countdown-card {
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, var(--deep-rose), var(--dusty-mauve), var(--soft-gold));
            border-radius: 25px;
            padding: 40px 30px;
            color: white;
            box-shadow: 0 15px 50px rgba(183, 110, 121, 0.3);
        }

        .countdown-title {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            margin-bottom: 25px;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 15px 10px;
        }

        .countdown-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            display: block;
        }

        .countdown-label {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* ============ FOOTER ============ */
        .footer {
            text-align: center;
            padding: 40px 20px 30px;
        }

        .footer-heart {
            font-size: 30px;
            animation: pulse 2s ease-in-out infinite;
            display: inline-block;
        }

        .footer-text {
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            color: var(--deep-rose);
            margin-top: 10px;
        }

        .footer-small {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 15px;
            font-style: italic;
        }

        /* ============ EDITABLE STYLES ============ */
        [contenteditable="true"] {
            outline: none;
            position: relative;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .edit-mode [contenteditable="true"] {
            border: 2px dashed var(--dusty-mauve);
            padding: 5px 8px;
            cursor: text;
            background: rgba(255, 255, 255, 0.5);
        }

        .edit-mode [contenteditable="true"]:focus {
            border-color: var(--deep-rose);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(183, 110, 121, 0.2);
        }

        .edit-mode [contenteditable="true"]:hover {
            border-color: var(--deep-rose);
        }

        .edit-mode .photo-frame {
            cursor: pointer;
        }

        .edit-hint {
            display: none;
            font-size: 11px;
            color: var(--text-light);
            font-style: italic;
            margin-top: 4px;
        }

        .edit-mode .edit-hint {
            display: block;
        }

        /* Hidden file input */
        .file-input {
            display: none;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(90, 61, 74, 0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 25px;
            padding: 35px;
            max-width: 550px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(90, 61, 74, 0.3);
            position: relative;
        }

        .modal h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: var(--deep-rose);
            margin-bottom: 20px;
        }

        .modal p {
            font-size: 14px;
            color: var(--text-medium);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: var(--deep-rose);
        }

        .generated-link {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--blush);
            border-radius: 12px;
            font-size: 12px;
            font-family: monospace;
            color: var(--text-medium);
            background: var(--warm-cream);
            word-break: break-all;
            margin-bottom: 15px;
            min-height: 80px;
            resize: none;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .share-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Lora', serif;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            color: white;
        }

        .share-btn.copy {
            background: var(--deep-rose);
        }

        .share-btn.whatsapp {
            background: #25D366;
        }

        .share-btn.email {
            background: var(--soft-gold);
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal-note {
            background: var(--warm-cream);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-light);
            border-left: 3px solid var(--soft-gold);
        }

        .modal-note strong {
            color: var(--text-dark);
        }

        .link-warning {
            background: #fff3cd;
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
            font-size: 13px;
            color: #856404;
            border-left: 3px solid #ffc107;
            display: none;
        }

        /* ============ ENTRY ANIMATION ============ */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }

        .fade-in:nth-child(1) { animation-delay: 0.1s; }
        .fade-in:nth-child(2) { animation-delay: 0.3s; }
        .fade-in:nth-child(3) { animation-delay: 0.5s; }
        .fade-in:nth-child(4) { animation-delay: 0.7s; }
        .fade-in:nth-child(5) { animation-delay: 0.9s; }
        .fade-in:nth-child(6) { animation-delay: 1.1s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
